name: Package Latest

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: package-latest
  cancel-in-progress: false

jobs:
  package-latest:
    name: Build latest install package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-xml zip unzip libxml2-utils
          gh --version

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts --legacy-peer-deps
          else
            npm install --ignore-scripts --legacy-peer-deps
          fi

      - name: Read extension version
        id: version
        run: |
          version="$(php -r '$xml = simplexml_load_file("meta.xml"); echo trim((string) $xml->version);')"
          release="$(php -r '$xml = simplexml_load_file("meta.xml"); echo trim((string) $xml->release);')"
          if [ -z "$version" ] || [ -z "$release" ]; then
            echo "Unable to read version/release from meta.xml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"

      - name: Validate package inputs
        run: |
          find plib htdocs \( -name '*.php' -o -name '*.phtml' \) -print0 \
            | sort -z \
            | xargs -0 -n1 php -l
          npm test
          xmllint --noout meta.xml
          node -e "JSON.parse(require('fs').readFileSync('packaging/manifest.json', 'utf8'))"
          sh -n packaging/build.sh

      - name: Build latest ZIP
        id: package
        run: |
          version="${{ steps.version.outputs.version }}"
          release="${{ steps.version.outputs.release }}"
          channel="${GITHUB_REF_NAME}"
          asset="cloudflare-pro.zip"
          release_tag="latest"

          if [ "$channel" = "beta" ]; then
            asset="cloudflare-pro-beta.zip"
            release_tag="latest-beta"
          fi

          sh packaging/build.sh
          zip -T "cloudflare-pro-${version}-${release}.zip"
          cp "cloudflare-pro-${version}-${release}.zip" "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Prepare latest release notes
        run: |
          release_tag="${{ steps.package.outputs.release_tag }}"
          asset="${{ steps.package.outputs.asset }}"
          channel="${{ steps.package.outputs.channel }}"
          cat > latest-release-notes.md <<EOF
          Rolling ${channel} package for Cloudflare Pro.

          Version: ${{ steps.version.outputs.version }}-${{ steps.version.outputs.release }}
          Commit: ${GITHUB_SHA}
          Branch: ${channel}

          Install with:

          \`\`\`sh
          plesk bin extension --install-url https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/${asset}
          \`\`\`
          EOF

      - name: Move rolling tag
        run: |
          release_tag="${{ steps.package.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$release_tag" "$GITHUB_SHA"
          git push origin "refs/tags/${release_tag}" --force

      - name: Publish latest package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          release="${{ steps.version.outputs.release }}"
          release_tag="${{ steps.package.outputs.release_tag }}"
          asset="${{ steps.package.outputs.asset }}"
          channel="${{ steps.package.outputs.channel }}"
          title="Cloudflare Pro ${channel} (v${version}-${release})"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" "$asset" --clobber
            gh release edit "$release_tag" --title "$title" --notes-file latest-release-notes.md --prerelease
          else
            gh release create "$release_tag" "$asset" \
              --title "$title" \
              --notes-file latest-release-notes.md \
              --prerelease
          fi
